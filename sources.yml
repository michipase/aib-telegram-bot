# This registry maps all official Italian wildfire risk bulletins to connector parameters.
# Used by Phase 1-2 multi-region ingestion system (docs/ROADMAP.md).
#
# Schema: https://docs.example.com/aib-registry-schema/1.0
# Legal: Each source is marked with redistribution rights per individual terms of use.

