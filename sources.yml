    update_cadence: "variable"
    legal_basis: "Public domain, CC0"
    confidence: "HIGH"
    fallback_contact: "info@protezionecivile.it; 1800-100-100"
    priority_tier: "TIER_FALLBACK"
    notes: "National coordination point; used for attribution and emergency messaging"

  - source_id: "it-vvf-main"
